<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Globe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="container"></div>

    <button id="toggleSidebar" class="toggle-btn">☰</button>

    <div id="sidebar" class="sidebar">
      <h2>Controls</h2>

      <details class="control-section" open>
        <summary>Animation & Export</summary>

        <div class="control-group">
          <label for="startLocation">Start Location</label>
          <select id="startLocation"></select>
        </div>

        <div class="control-group">
          <label for="endLocation">End Location</label>
          <select id="endLocation"></select>
        </div>

        <div class="control-group">
          <label for="spinSpeed">Spin Speed</label>
          <input
            type="range"
            id="spinSpeed"
            min="10"
            max="120"
            step="5"
            value="35"
          />
          <span id="spinSpeedValue">35°/s</span>
        </div>

        <div class="control-group">
          <label for="exportWidth">Export Width</label>
          <input
            type="number"
            id="exportWidth"
            min="240"
            max="3840"
            step="10"
            value="1920"
          />
        </div>

        <div class="control-group">
          <label for="exportHeight">Export Height</label>
          <input
            type="number"
            id="exportHeight"
            min="240"
            max="3840"
            step="10"
            value="1080"
          />
        </div>

        <div class="control-group recording-group">
          <button id="previewSpin" class="wide-btn secondary-btn">
            Preview Spin
          </button>
          <button id="recordSpin" class="wide-btn">Record Spin</button>
          <a id="downloadRecording" class="download-btn disabled" download>
            Download Recording
          </a>
          <p id="recordingStatus" class="status-text">
            Choose two locations to create a recording.
          </p>
        </div>
      </details>

      <details class="control-section" open>
        <summary>Locations</summary>

        <div class="control-group">
          <label>Locations</label>
          <div id="locationList"></div>
          <input type="text" id="newLocation" placeholder="Add new location" />
          <button id="addLocation">Add</button>
          <p id="locationStatus" class="status-text">
            Add a location to place its marker immediately.
          </p>
        </div>

        <button id="refreshMarkers">Refresh Markers</button>
      </details>

      <details class="control-section" open>
        <summary>Appearance</summary>

        <div class="control-group">
          <label for="bgColor">Background Color</label>
          <input type="color" id="bgColor" value="#ffffff" />
        </div>

        <div class="control-group">
          <label for="markerColor">Marker Color</label>
          <input type="color" id="markerColor" value="#E60000" />
        </div>

        <div class="control-group">
          <label for="markerSize">Marker Size</label>
          <input
            type="range"
            id="markerSize"
            min="2"
            max="20"
            step="0.5"
            value="8"
          />
          <span id="markerSizeValue">8px</span>
        </div>
      </details>

      <details class="control-section">
        <summary>Lighting & Shadow</summary>

        <div class="control-group">
          <label for="ambientLight">Ambient Light</label>
          <input
            type="range"
            id="ambientLight"
            min="0"
            max="3"
            step="0.1"
            value="1.2"
          />
          <span id="ambientLightValue">1.2</span>
        </div>

        <div class="control-group">
          <label for="directionalLight">Directional Light</label>
          <input
            type="range"
            id="directionalLight"
            min="0"
            max="3"
            step="0.1"
            value="1.5"
          />
          <span id="directionalLightValue">1.5</span>
        </div>

        <div class="control-group">
          <label for="shadowOpacity">Shadow Opacity</label>
          <input
            type="range"
            id="shadowOpacity"
            min="0"
            max="1"
            step="0.05"
            value="0.35"
          />
          <span id="shadowOpacityValue">0.35</span>
        </div>

        <div class="control-group">
          <label for="shadowSize">Shadow Size</label>
          <input
            type="range"
            id="shadowSize"
            min="2"
            max="8"
            step="0.5"
            value="5"
          />
          <span id="shadowSizeValue">5.0</span>
        </div>

        <div class="control-group">
          <label for="shadowPosition">Shadow Distance</label>
          <input
            type="range"
            id="shadowPosition"
            min="-2.5"
            max="-1.0"
            step="0.1"
            value="-1.8"
          />
          <span id="shadowPositionValue">1.8</span>
        </div>
      </details>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
